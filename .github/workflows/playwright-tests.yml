name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/python:v1.58.0-noble

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Preflight - Verify login URL is reachable
        run: |
          python - << 'PY'
          import configparser
          import requests

          cfg = configparser.ConfigParser()
          cfg.read('config.ini')
          url = cfg.get('GLOBAL', 'online_url', fallback='').strip()
          if not url:
              raise SystemExit('online_url is missing in config.ini')

          print(f'Checking URL: {url}')
          try:
              response = requests.get(url, timeout=30)
              print(f'Status code: {response.status_code}')
              if response.status_code >= 400:
                  raise SystemExit(f'Login URL returned HTTP {response.status_code}')
          except requests.RequestException as exc:
              raise SystemExit(f'Cannot reach login URL from GitHub Actions runner: {exc}')
          PY

      - name: Run tests
        env:
          CI: "true"
          GITHUB_ACTIONS: "true"
        run: |
          mkdir -p test-results
          pytest -vv --tracing=retain-on-failure --alluredir=allure-results --junitxml=test-results/junit.xml --html=test-results/pytest-report.html --self-contained-html

      - name: Upload allure results
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          if-no-files-found: warn

      - name: Upload test reports
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: test-results/
          if-no-files-found: warn